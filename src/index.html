
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Storefront Ops Copilot</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #1769aa;
      --accent-dark: #0f4d7f;
      --soft: #eef6fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 24px;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    header p {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
      line-height: 1.5;
    }

    main {
      display: grid;
      grid-template-columns: minmax(280px, 420px) minmax(320px, 1fr);
      gap: 20px;
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      font-size: 14px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 11px 12px;
      font: inherit;
      background: #fff;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 6px;
      padding: 13px 16px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    .output {
      display: grid;
      gap: 14px;
    }

    .block {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
    }

    .block h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .block p,
    .block li {
      line-height: 1.5;
    }

    .block p {
      margin: 0;
    }

    ul,
    ol {
      margin: 0;
      padding-left: 22px;
    }

    .empty {
      color: var(--muted);
      background: var(--soft);
      border: 1px dashed #9cc9e2;
      border-radius: 8px;
      padding: 16px;
      line-height: 1.5;
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Storefront Ops Copilot</h1>
    <p>
      A simple local prototype for generating Shopify product-page assets from structured product inputs.
    </p>
  </header>

  <main>
    <section>
      <h2>Product Inputs</h2>
      <label for="productName">Product name</label>
      <input id="productName" value="Pet Steam Grooming Brush" />

      <label for="customer">Target customer</label>
      <input id="customer" value="Cat and dog owners" />

      <label for="problem">Main customer problem</label>
      <textarea id="problem">Pet hair shedding, messy grooming, and uncomfortable dry brushing at home.</textarea>

      <label for="benefits">Product benefits</label>
      <textarea id="benefits">Helps remove loose fur, supports smoother grooming, and makes daily pet care easier.</textarea>

      <label for="price">Price range</label>
      <input id="price" value="$29-$49" />

      <button id="generate">Generate Storefront Assets</button>
    </section>

    <section>
      <h2>Generated Output</h2>
      <div id="output" class="empty">
        Fill in the product inputs, then generate product-page copy, FAQ, trust section, and launch checklist.
      </div>
    </section>
  </main>

  <script>
    const fields = {
      productName: document.getElementById("productName"),
      customer: document.getElementById("customer"),
      problem: document.getElementById("problem"),
      benefits: document.getElementById("benefits"),
      price: document.getElementById("price"),
      output: document.getElementById("output"),
      generate: document.getElementById("generate"),
    };

    function clean(value) {
      return value.trim() || "Not provided";
    }

    function render() {
      const productName = clean(fields.productName.value);
      const customer = clean(fields.customer.value);
      const problem = clean(fields.problem.value);
      const benefits = clean(fields.benefits.value);
      const price = clean(fields.price.value);

      fields.output.className = "output";
      fields.output.innerHTML = `
        <div class="block">
          <h3>Product Title</h3>
          <p>${productName} for ${customer}</p>
        </div>

        <div class="block">
          <h3>Short Description</h3>
          <p>${productName} helps ${customer.toLowerCase()} solve a common problem: ${problem.toLowerCase()} It is designed to make the product benefit clear, practical, and easy to understand.</p>
        </div>

        <div class="block">
          <h3>Key Benefits</h3>
          <ul>
            <li>${benefits}</li>
            <li>Easy to explain on a focused Shopify product page.</li>
            <li>Suitable for short-form product demonstrations.</li>
            <li>Can be tested with a simple one-product storefront.</li>
          </ul>
        </div>

        <div class="block">
          <h3>FAQ Draft</h3>
          <p><strong>Who is this product for?</strong><br>${customer}.</p>
          <p><strong>What problem does it solve?</strong><br>${problem}</p>
          <p><strong>What price range should be reviewed?</strong><br>${price}.</p>
        </div>

        <div class="block">
          <h3>Trust Section</h3>
          <ul>
            <li>Clear product use case</li>
            <li>Simple storefront offer</li>
            <li>Mobile-first product page review</li>
            <li>Shipping, return, and support information near checkout</li>
          </ul>
        </div>

        <div class="block">
          <h3>Launch Checklist</h3>
          <ol>
            <li>Confirm supplier cost, shipping time, and product variants.</li>
            <li>Prepare product photos or demonstration assets.</li>
            <li>Add product title, description, FAQ, and trust section.</li>
            <li>Review mobile layout and add-to-cart flow.</li>
            <li>Confirm checkout, payment, shipping, and support information.</li>
            <li>Prepare three short-form content angles for testing.</li>
          </ol>
        </div>
      `;
    }

    fields.generate.addEventListener("click", render);
  </script>
</body>
</html>
